<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스터디룸 — Watchman</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/study-group-session.css" />
</head>
<body>
<div class="sgs-page">

  <!-- 내 딴짓 감지 오버레이 -->
  <div class="sgs-distraction-overlay" id="sgs-distraction-overlay" style="display:none"></div>

  <!-- Calibration overlay -->
  <div class="calib-overlay" id="calib-overlay" style="display:none">
    <div class="calib-modal">
      <h2 class="calib-title">공부 환경 보정</h2>
      <p class="calib-desc">
        평소 공부할 때처럼 <strong>10초간 자연스럽게</strong> 움직여 주세요.<br>
        태블릿, 책, 노트 등을 실제로 봐도 됩니다.
      </p>
      <div class="calib-countdown-wrap">
        <svg class="calib-ring" viewBox="0 0 120 120">
          <circle class="calib-ring-bg" cx="60" cy="60" r="50"/>
          <circle class="calib-ring-fill" id="calib-ring-fill" cx="60" cy="60" r="50"
                  stroke-dasharray="314" stroke-dashoffset="314"/>
        </svg>
        <span class="calib-countdown" id="calib-countdown">10</span>
      </div>
      <div class="calib-tips">
        <div class="calib-tip-item" id="calib-tip-center">
          <span class="calib-tip-dot" id="dot-center"></span>정면 화면 바라보기
        </div>
        <div class="calib-tip-item" id="calib-tip-side">
          <span class="calib-tip-dot" id="dot-side"></span>옆 자료 (태블릿·책) 보기
        </div>
        <div class="calib-tip-item" id="calib-tip-down">
          <span class="calib-tip-dot" id="dot-down"></span>아래 노트 내려보기
        </div>
      </div>
      <p class="calib-status" id="calib-status">FaceLandmarker 준비 중...</p>
      <button class="calib-skip-btn" onclick="skipCalibration()">건너뛰고 기본값으로 시작</button>
    </div>
  </div>

  <!-- Navbar -->
  <nav class="sgs-nav">
    <a href="main.html" class="sgs-nav-logo">
      <img src="assets/icon.svg" alt="Watchman" />
      <span>Watchman</span>
    </a>
    <div class="sgs-nav-center">
      <span class="sgs-nav-group-name" id="sgs-group-name">스터디룸</span>
      <span class="sgs-nav-timer" id="sgs-timer" style="display:none">00:00</span>
    </div>
    <div class="sgs-nav-right">
      <button class="sgs-cam-btn" id="btn-cam" onclick="toggleCamera()">카메라 끄기</button>
      <button class="sgs-calib-btn" onclick="startCalibration()">보정하기</button>
      <button class="sgs-exit-btn" id="btn-exit" onclick="handleExit()">세션 종료</button>
    </div>
  </nav>

  <!-- Body -->
  <div class="sgs-body">

    <!-- 카메라 그리드 -->
    <div class="sgs-grid-wrap">
      <div class="sgs-grid" id="sgs-grid">
        <!-- 타일은 JS로 동적 생성 -->
      </div>
    </div>

    <!-- 우측 패널 -->
    <div class="sgs-panel">

      <!-- 통계 카드 -->
      <div class="sgs-stats-card">
        <div class="sgs-card-label">이번 세션</div>
        <div class="sgs-stat-row">
          <span class="sgs-stat-label"><span class="sgs-stat-dot green"></span>집중</span>
          <span class="sgs-stat-val" id="sgs-stat-focused">00:00</span>
        </div>
        <div class="sgs-stat-row">
          <span class="sgs-stat-label"><span class="sgs-stat-dot red"></span>딴짓</span>
          <span class="sgs-stat-val" id="sgs-stat-distracted">00:00</span>
        </div>
        <div class="sgs-stat-row" style="margin-bottom:0">
          <span class="sgs-stat-label"><span class="sgs-stat-dot orange"></span>집중률</span>
          <span class="sgs-stat-val" id="sgs-stat-rate">0%</span>
        </div>
        <div class="sgs-bar-wrap">
          <div class="sgs-bar-fill" id="sgs-bar" style="width:0%"></div>
        </div>
      </div>

      <!-- 채팅 카드 -->
      <div class="sgs-chat-card">
        <div class="sgs-card-label">채팅</div>
        <div class="sgs-chat-messages" id="sgs-chat-messages"></div>
        <div class="sgs-chat-input-row">
          <input class="sgs-chat-input" id="sgs-chat-input"
                 placeholder="메시지 입력..."
                 maxlength="200"
                 onkeydown="if(event.key==='Enter')sendChat()" />
          <button class="sgs-chat-send-btn" onclick="sendChat()">전송</button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- SockJS + STOMP (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script src="js/auth-guard.js"></script>
<script src="js/achievement-toast.js"></script>
<script src="js/study-group-session.js"></script>
</body>
</html>
