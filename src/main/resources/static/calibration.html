<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>보정 — Watchman</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/calibration.css" />
</head>
<body>
<div class="calib-page">

  <!-- Navigation -->
  <nav class="calib-nav" aria-label="보정 페이지 내비게이션">
    <a href="main.html" class="calib-nav-logo">
      <img src="assets/icon.svg" alt="Watchman" class="calib-nav-icon" />
      <span>Watchman</span>
    </a>
    <h1 class="calib-nav-title">공부 환경 보정</h1>
    <button class="calib-nav-skip" onclick="skipAndStart()">건너뛰기</button>
  </nav>

  <!-- Main body: two-column layout -->
  <main class="calib-body">

    <!-- LEFT: Camera column -->
    <section class="calib-camera-col" aria-label="카메라 미리보기">

      <!-- Camera frame -->
      <div class="calib-camera-frame" id="calib-camera-frame">
        <video id="calib-video" muted playsinline></video>

        <!-- Loading overlay (shown until camera + model ready) -->
        <div class="calib-cam-overlay" id="calib-cam-overlay" aria-live="polite">
          <div class="calib-spinner" role="status" aria-label="로딩 중"></div>
          <span id="calib-cam-overlay-text">카메라 연결 중...</span>
        </div>

        <!-- Angle HUD (hidden until model ready) -->
        <div class="calib-angle-hud" id="calib-angle-hud" style="display:none" aria-hidden="true">
          <!-- Yaw row -->
          <div class="calib-angle-row">
            <span class="calib-angle-label">Yaw</span>
            <div class="calib-angle-bar-wrap">
              <div class="calib-angle-center"></div>
              <div class="calib-angle-fill" id="hud-yaw-fill"></div>
            </div>
            <span class="calib-angle-val" id="hud-yaw-val">0°</span>
          </div>
          <!-- Pitch row -->
          <div class="calib-angle-row">
            <span class="calib-angle-label">Pitch</span>
            <div class="calib-angle-bar-wrap">
              <div class="calib-angle-center"></div>
              <div class="calib-angle-fill" id="hud-pitch-fill"></div>
            </div>
            <span class="calib-angle-val" id="hud-pitch-val">0°</span>
          </div>
        </div>
      </div>

    </section>

    <!-- RIGHT: Control column -->
    <aside class="calib-control-col" aria-label="보정 단계">

      <!-- Loading step -->
      <div class="calib-step" id="step-loading" role="status" aria-live="polite">
        <div class="calib-step-icon" aria-hidden="true">
          <div class="calib-loader"></div>
        </div>
        <h2>준비 중...</h2>
        <p id="calib-load-status">카메라와 얼굴 감지 모델을 불러오고 있어요</p>
      </div>

      <!-- Main calibration panel -->
      <div class="calib-main" id="step-main" style="display:none">

        <div class="calib-main-header">
          <h2>자세 보정</h2>
          <p>각 자세를 3초씩 보정하면 집중 판정이 더 정확해져요</p>
        </div>

        <!-- Card: 정면 보정 -->
        <div class="calib-card" id="card-screen">
          <div class="calib-card-row">
            <div class="calib-card-info">
              <span class="calib-card-icon" aria-hidden="true">🖥️</span>
              <div class="calib-card-text">
                <span class="calib-card-title">정면 보정 <span class="calib-tag calib-tag-required">필수</span></span>
                <span class="calib-card-desc">화면을 자연스럽게 바라봐 주세요</span>
              </div>
            </div>
            <div class="calib-card-action">
              <span class="calib-status-badge" id="status-screen">미보정</span>
              <button class="btn-calib-do" id="btn-screen" onclick="startCalib('screen')">보정하기</button>
            </div>
          </div>
          <div class="calib-card-progress" id="progress-screen" style="display:none">
            <div class="calib-card-progress-bar" id="progress-bar-screen"></div>
          </div>
        </div>

        <!-- Card: 태블릿 보정 -->
        <div class="calib-card" id="card-tablet">
          <div class="calib-card-row">
            <div class="calib-card-info">
              <span class="calib-card-icon" aria-hidden="true">📱</span>
              <div class="calib-card-text">
                <span class="calib-card-title">태블릿 보정 <span class="calib-tag calib-tag-optional">선택</span></span>
                <span class="calib-card-desc">옆에 있는 태블릿·기기를 바라봐 주세요</span>
              </div>
            </div>
            <div class="calib-card-action">
              <span class="calib-status-badge" id="status-tablet">미보정</span>
              <button class="btn-calib-do" id="btn-tablet" onclick="startCalib('tablet')">보정하기</button>
            </div>
          </div>
          <div class="calib-card-progress" id="progress-tablet" style="display:none">
            <div class="calib-card-progress-bar" id="progress-bar-tablet"></div>
          </div>
        </div>

        <!-- Card: 책 보정 -->
        <div class="calib-card" id="card-book">
          <div class="calib-card-row">
            <div class="calib-card-info">
              <span class="calib-card-icon" aria-hidden="true">📓</span>
              <div class="calib-card-text">
                <span class="calib-card-title">책 보정 <span class="calib-tag calib-tag-optional">선택</span></span>
                <span class="calib-card-desc">아래 책·노트를 바라봐 주세요</span>
              </div>
            </div>
            <div class="calib-card-action">
              <span class="calib-status-badge" id="status-book">미보정</span>
              <button class="btn-calib-do" id="btn-book" onclick="startCalib('book')">보정하기</button>
            </div>
          </div>
          <div class="calib-card-progress" id="progress-book" style="display:none">
            <div class="calib-card-progress-bar" id="progress-bar-book"></div>
          </div>
        </div>

        <button class="calib-start-btn" id="btn-start" onclick="goToStudy()" disabled>
          스터디 시작하기
        </button>
        <button class="calib-skip-link" onclick="skipAndStart()">건너뛰고 기본값으로 시작</button>

      </div>

    </aside>
  </main>

</div>
<script src="js/auth-guard.js"></script>
<script src="js/calibration.js"></script>
</body>
</html>
