<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문의하기 — Watchman</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/footer-pages.css" />
</head>
<body>
<div class="fp-page">
  <nav class="fp-nav">
    <a href="main.html" style="display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:#78716c;text-decoration:none">← 돌아가기</a>
    <a href="index.html" class="nav-logo">
      <img src="assets/icon.svg" alt="Watchman" width="32" height="32" />
      <span>Watchman</span>
    </a>
    <div style="width:110px"></div>
  </nav>
  <div class="fp-content">
    <p class="fp-eyebrow">Contact Us</p>
    <h1 class="fp-title">문의하기</h1>
    <p class="fp-subtitle">버그 신고, 기능 제안, 일반 문의 등 무엇이든 편하게 보내주세요.</p>

    <div class="fp-contact-cards">
      <div class="fp-contact-card">
        <div class="fp-contact-card-icon">📧</div>
        <div class="fp-contact-card-label">이메일</div>
        <div class="fp-contact-card-value">support@watchman.kr</div>
      </div>
      <div class="fp-contact-card">
        <div class="fp-contact-card-icon">⏰</div>
        <div class="fp-contact-card-label">응답 시간</div>
        <div class="fp-contact-card-value">영업일 1-2일 내</div>
      </div>
      <div class="fp-contact-card">
        <div class="fp-contact-card-icon">🌐</div>
        <div class="fp-contact-card-label">운영 시간</div>
        <div class="fp-contact-card-value">평일 09:00 - 18:00</div>
      </div>
    </div>

    <form class="fp-contact-form" onsubmit="handleContactSubmit(event)">
      <div class="fp-form-field">
        <label class="fp-form-label">이름</label>
        <input type="text" class="fp-form-input" placeholder="이름을 입력해 주세요" required />
      </div>
      <div class="fp-form-field">
        <label class="fp-form-label">이메일</label>
        <input type="email" class="fp-form-input" placeholder="답변받을 이메일 주소" required />
      </div>
      <div class="fp-form-field">
        <label class="fp-form-label">문의 유형</label>
        <select class="fp-form-input">
          <option value="">선택해 주세요</option>
          <option value="bug">버그 신고</option>
          <option value="feature">기능 제안</option>
          <option value="account">계정 문의</option>
          <option value="general">일반 문의</option>
          <option value="other">기타</option>
        </select>
      </div>
      <div class="fp-form-field">
        <label class="fp-form-label">내용</label>
        <textarea class="fp-form-input fp-form-textarea" placeholder="문의 내용을 자세히 적어주세요." required></textarea>
      </div>
      <p id="contact-success" style="display:none;color:var(--good);font-size:14px;font-weight:600">✓ 문의가 접수되었습니다. 빠른 시일 내에 답변 드리겠습니다.</p>
      <button type="submit" class="fp-form-submit">문의 보내기</button>
    </form>
  </div>
  <footer class="app-footer">
    <nav class="footer-links">
      <a href="service-intro.html" class="footer-link">서비스 소개</a>
      <span class="footer-divider">|</span>
      <a href="terms.html" class="footer-link">이용약관</a>
      <span class="footer-divider">|</span>
      <a href="privacy.html" class="footer-link">개인정보처리방침</a>
      <span class="footer-divider">|</span>
      <a href="contact.html" class="footer-link">문의하기</a>
    </nav>
    <div class="footer-separator"></div>
    <div class="footer-copy">
      <img src="assets/icon.svg" alt="Watchman" width="18" height="18" />
      <span>Watchman © 2026 — 당신의 집중을 응원합니다.</span>
    </div>
  </footer>
</div>
<script>
function handleContactSubmit(e) {
  e.preventDefault();
  document.getElementById('contact-success').style.display = 'block';
  e.target.reset();
}
</script>
</body>
</html>
