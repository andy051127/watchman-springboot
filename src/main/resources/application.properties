spring.application.name=watchman

# ════════════════════════════════════════════════
#  서버 설정
# ════════════════════════════════════════════════

# 내장 Tomcat 포트
server.port=8080

# 컨텍스트 경로
# JS 파일의 fetch('/watchman/api/...') 경로와 일치해야 한다.
server.servlet.context-path=/watchman


# ════════════════════════════════════════════════
#  데이터베이스 설정
# ════════════════════════════════════════════════

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3308/watchman?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
spring.datasource.username=watchman_db
spring.datasource.password=watchman1234

# HikariCP 커넥션 풀
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# 서버 시작 시 schema.sql 자동 실행 (테이블 없으면 생성)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# 세션 타임아웃: 기본 8시간 (명시적 로그아웃 전까지 유지)
server.servlet.session.timeout=8h


# ════════════════════════════════════════════════
#  Jackson (JSON 직렬화)
# ════════════════════════════════════════════════

# LocalDate → "2026-05-04" 형태로 직렬화 (숫자 배열 방지)
spring.jackson.serialization.write-dates-as-timestamps=false


# ════════════════════════════════════════════════
#  로그 설정
# ════════════════════════════════════════════════

logging.level.com.watchman=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.jdbc.core=DEBUG